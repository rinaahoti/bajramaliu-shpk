<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Nile Home Redirect</title>
    <meta http-equiv="refresh" content="0; url=home-1.html">
    <script>
        window.location.replace("home-1.html");
    </script>
    <style>
        .site-logo-lockup {
            display: inline-flex !important;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
            white-space: nowrap;
            vertical-align: middle;
        }

        .site-logo-lockup img {
            height: 64px;
            width: auto;
            display: block;
            flex: 0 0 auto;
            filter: brightness(0) saturate(100%) invert(36%) sepia(90%) saturate(2211%) hue-rotate(341deg) brightness(92%) contrast(95%);
        }

        .site-logo-wordmark {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.05;
            flex: 0 1 auto;
        }

        .site-logo-wordmark small {
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.2px;
            text-transform: none;
            margin-bottom: 4px;
        }

        .site-logo-wordmark strong {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.15px;
            text-transform: none;
        }

        .site-logo-wordmark-light small {
            color: rgba(255, 255, 255, 0.72);
        }

        .site-logo-wordmark-light strong {
            color: #ffffff;
        }

        .site-logo-wordmark-dark small {
            color: #7f8a92;
        }

        .site-logo-wordmark-dark strong {
            color: #07141d;
        }

        @media (max-width: 767.98px) {
            .site-logo-lockup img {
                height: 54px;
            }

            .site-logo-wordmark strong {
                font-size: 13px;
            }

            .site-logo-wordmark small {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <p>If you are not redirected automatically, <a href="home-1.html">open the homepage</a>.</p>
</body>
</html>
